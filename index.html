<!DOCTYPE html>
<html lang="ko">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>셩이와 봄이의 청지기 일지</title>
      <link rel="stylesheet" href="css/style.css">
      <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

      <script>
        // KakaoTalk in-app browser redirect
        var userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.indexOf('kakaotalk') > -1) {
          if (userAgent.indexOf('android') > -1) {
            location.href = 'intent://' + location.href.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
          } else if (userAgent.indexOf('iphone') > -1 || userAgent.indexOf('ipad') > -1) {
            alert("구글 보안 정책으로 인해 카카오톡 안에서는 로그인이 불가능합니다.\n\n화면 우측 하단의 [ 🧭 나침반 아이콘 ] 또는 [ Safari로 열기 ]를 눌러주세요!");
          }
        }
      </script>
  </head>
  <body>
    <div class="app-version">v.1.1.0</div>

    <!-- ── LOGIN ── -->
    <div id="screen-login">
        <div class="login-box">
            <div class="login-logo">청<span>지기</span></div>
            <div class="login-tagline">가계부 &amp; 지출계획</div>
            <div class="login-bible-verse">
                "너희는 먼저 그의 나라와 그의 의를 구하라<br>
                그리하면 이 모든 것을 너희에게 더하시리라"<br>
                <span class="verse-ref">- 마 6:33 -</span>
            </div>
            <button class="google-btn" onclick="signInGoogle()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google로 시작하기
            </button>
        </div>
    </div>

    <!-- ── PROFILE SELECT ── -->
    <div id="screen-profile" style="display:none">
        <div class="profile-header">
            <div class="profile-header-user">
                <div class="user-avatar-small" id="user-avatar-small">?</div>
                <button class="signout-btn" onclick="signOutUser()">로그아웃</button>
            </div>
            <div class="profile-screen-title">청<span>지기</span></div>
            <div class="profile-screen-sub">누구의 가계부를 볼까요?</div>
            <!-- My ID bar: shown after username is set -->
            <div class="my-id-bar" id="my-id-bar" style="display:none">
                <span class="my-id-label">내 ID</span>
                <span class="my-id-value" id="my-id-value">@...</span>
                <button class="my-id-copy" onclick="copyMyId()">복사</button>
                <button class="friends-btn" onclick="openFriendsModal()">👥 친구</button>
            </div>
        </div>
        <div class="profile-content">
            <div class="section-label">프로필 선택</div>
            <div id="profile-list"></div>
            <div class="section-label">새 프로필 만들기</div>
            <div class="new-profile-box">
                <div class="new-profile-row" style="position: relative;">
                    <div class="emoji-select-wrapper">
                        <div class="selected-emoji-display" id="profile-emoji-display" onclick="toggleEmojiPicker(event)">😊</div>
                        <input type="hidden" id="profile-emoji" value="😊">
                        <div class="emoji-picker" id="emoji-picker" style="display: none;">
                            <div class="emoji-grid" id="emoji-grid"></div>
                        </div>
                    </div>
                    <input class="input-field" id="profile-name" placeholder="이름 입력" maxlength="10">
                    <button class="btn-create" onclick="createProfile()">만들기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── MAIN APP ── -->
    <div id="screen-app" style="display:none">
        <div class="topbar">
            <div class="topbar-left">
                <button class="back-btn" onclick="backToProfiles()">←</button>
                <div class="topbar-profile">
                    <span class="topbar-emoji" id="current-profile-emoji"></span>
                    <div class="topbar-name" id="current-profile-name"></div>
                </div>
            </div>
            <button class="fab" onclick="openAddModal()">＋</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="ledger"    onclick="switchTab('ledger')">📒 가계부</button>
            <button class="tab-btn"        data-tab="budget"    onclick="switchTab('budget')">💰 예산</button>
            <button class="tab-btn"        data-tab="dashboard" onclick="switchTab('dashboard')">📊 분석</button>
        </div>

        <!-- Planner selector — shared context for all three tabs -->
        <div class="planner-strip" id="planner-strip" style="display:none">
            <select class="planner-select" id="planner-select" onchange="switchPlanner(this.value)"></select>
            <button class="new-planner-btn" onclick="openNewPlannerModal()">＋ 새 플래너</button>
        </div>

        <div class="panels">
            <!-- LEDGER -->
            <div class="panel active" id="panel-ledger">
                <div class="ledger-controls">
                    <input type="month" class="month-input" id="ledger-month"
                           onchange="renderLedger()" placeholder="전체 기간">
                    <select class="filter-sel" id="filter-type" onchange="renderLedger()">
                        <option value="all">전체</option>
                        <option value="income">수입만</option>
                        <option value="expense">지출만</option>
                    </select>
                </div>
                <div class="summary-strip">
                    <div class="strip-card income-card"><div class="strip-label">수입</div><div class="strip-amount" id="ledger-income">0</div></div>
                    <div class="strip-card expense-card"><div class="strip-label">지출</div><div class="strip-amount" id="ledger-expense">0</div></div>
                    <div class="strip-card balance-card"><div class="strip-label">잔액</div><div class="strip-amount" id="ledger-balance">0</div></div>
                </div>
                <div id="tx-list"></div>
            </div>

            <!-- BUDGET (no month selector — planner is the scope) -->
            <div class="panel" id="panel-budget">
                <div id="budget-list"></div>
            </div>

            <!-- DASHBOARD -->
            <div class="panel" id="panel-dashboard">
                <div class="dash-grid">
                    <div class="dash-card"><div class="dash-label">수입</div><div class="dash-amount income" id="dash-income">0원</div></div>
                    <div class="dash-card"><div class="dash-label">지출</div><div class="dash-amount expense" id="dash-expense">0원</div></div>
                    <div class="dash-card"><div class="dash-label">잔액</div><div class="dash-amount" id="dash-balance">0원</div></div>
                </div>
                <div class="dash-section">
                    <div class="dash-section-title">카테고리별 지출</div>
                    <div id="cat-chart"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── NEW PLANNER MODAL ── -->
    <div class="modal-overlay" id="new-planner-modal" onclick="if(event.target===this)closeModal('new-planner-modal')">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">새 플래너 만들기</div>
                <button class="modal-close" onclick="closeModal('new-planner-modal')">✕</button>
            </div>
            <div class="form-row">
                <label class="form-label">플래너 이름</label>
                <input class="form-input" id="planner-name-input"
                       placeholder="예: 2월 생활비, 제주 여행, 결혼 준비" maxlength="20"
                       onkeydown="if(event.key==='Enter')createPlanner()">
            </div>
            <button class="btn-submit" onclick="createPlanner()">만들기</button>
        </div>
    </div>

    <!-- ── USERNAME SETUP MODAL (forced, no dismiss) ── -->
    <div class="modal-overlay modal-center" id="username-modal">
        <div class="modal-box username-modal-box">
            <div class="modal-title" style="margin-bottom:12px;">나만의 ID 설정</div>
            <p class="username-modal-desc">
                친구 추가와 플래너 공유에 사용할 ID예요.<br>
                한 번 설정하면 변경할 수 없습니다.
            </p>
            <div class="username-input-wrap">
                <span class="username-prefix">@</span>
                <input class="form-input" id="username-input"
                       placeholder="영문·숫자·_ (3-20자)"
                       style="padding-left: 28px;"
                       oninput="checkUsernameAvailability()">
            </div>
            <div id="username-check-msg" class="username-check-msg muted"></div>
            <button class="btn-submit" onclick="submitUsername()" style="margin-top:14px;">설정하기</button>
        </div>
    </div>

    <!-- ── FRIENDS MODAL ── -->
    <div class="modal-overlay" id="friends-modal" onclick="if(event.target===this)closeFriendsModal()">
        <div class="modal-box friends-modal-box">
            <div class="modal-header">
                <div class="modal-title">친구 관리</div>
                <button class="modal-close" onclick="closeFriendsModal()">✕</button>
            </div>
            <!-- My ID display inside modal -->
            <div class="friends-modal-myid-row">
                <span class="friends-modal-myid-label">내 ID</span>
                <span class="friends-modal-myid-val" id="friends-modal-myid">@...</span>
                <button class="my-id-copy" onclick="copyMyId()">복사</button>
            </div>
            <!-- Friend list & requests -->
            <div id="friends-modal-content" class="friends-modal-scroll">
                <div class="friends-empty">불러오는 중...</div>
            </div>
            <!-- Search / Add friend -->
            <div class="friend-search-bar">
                <input class="friend-search-input" id="friend-search-input"
                       placeholder="@ID로 친구 추가"
                       onkeydown="if(event.key==='Enter')searchAndSendRequest()">
                <button class="friend-search-btn" onclick="searchAndSendRequest()">추가</button>
            </div>
        </div>
    </div>

    <!-- ── SHARE PROFILE MODAL ── -->
    <div class="modal-overlay" id="share-modal" onclick="if(event.target===this)closeModal('share-modal')">
        <div class="modal-box friends-modal-box">
            <div class="modal-header">
                <div class="modal-title">플래너 공유</div>
                <button class="modal-close" onclick="closeModal('share-modal')">✕</button>
            </div>
            <div id="share-modal-content" class="friends-modal-scroll">
                <div class="friends-empty">불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- ── ADD TRANSACTION MODAL ── -->
    <div class="modal-overlay" id="add-modal" onclick="if(event.target===this)closeModal('add-modal')">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">내역 추가</div>
                <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
            </div>
            <div class="type-row">
                <button class="type-btn active" data-type="income"  onclick="setTxType('income')">＋ 수입</button>
                <button class="type-btn"        data-type="expense" onclick="setTxType('expense')">－ 지출</button>
            </div>
            <div class="form-row">
                <label class="form-label">금액</label>
                <input class="form-input" id="tx-amount" type="text" oninput="this.value=fmtInput(this.value)" inputmode="numeric">
            </div>
            <div class="form-row">
                <label class="form-label">카테고리</label>
                <select class="form-input" id="tx-cat" onchange="if(window.updateSubCategoryOptions) window.updateSubCategoryOptions()"></select>
            </div>
            <div class="form-row" id="subcat-row">
                <label class="form-label">세부항목</label>
                <select class="form-input" id="tx-subcat" style="display: none;">
                    <option value="">세부 항목 (선택)</option>
                </select>
            </div>
            <div class="form-row">
                <label class="form-label">메모</label>
                <input class="form-input" id="tx-desc" type="text" placeholder="간단 메모">
            </div>
            <div class="form-row">
                <label class="form-label">날짜</label>
                <input class="form-input" id="tx-date" type="date">
            </div>
            <button class="btn-submit" onclick="addTransaction()">기록하기</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
