<div id="screen-profile" style="display:none">
    <div class="profile-header">
        <div class="profile-header-user">
            <div class="user-avatar-small" id="user-avatar-small">?</div>
            <button class="signout-btn" onclick="signOutUser()">로그아웃</button>
        </div>
        <div class="profile-screen-title">👋 안녕하세요</div>
        <div class="profile-screen-sub">누구의 가계부를 볼까요?</div>
    </div>
    <div class="profile-content">
        <div class="section-label">프로필 선택</div>
        <div id="profile-list"></div>

        <div class="section-label">새 프로필 만들기</div>
        <div class="new-profile-box">
            <div class="new-profile-row" style="position: relative;">
                <div class="emoji-select-wrapper">
                    <div class="selected-emoji-display" id="profile-emoji-display" onclick="toggleEmojiPicker(event)">😊</div>
                    <input type="hidden" id="profile-emoji" value="😊">
                    
                    <div class="emoji-picker" id="emoji-picker" style="display: none;">
                        <div class="emoji-grid" id="emoji-grid"></div>
                    </div>
                </div>
                
                <input class="input-field" id="profile-name" placeholder="이름 입력" maxlength="10" onkeydown="if(event.key==='Enter')createProfile()">
                <button class="btn-create" onclick="createProfile()">만들기</button>
            </div>
        </div>
    </div>
</div>
